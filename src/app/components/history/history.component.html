<section class="history-section" id="history">
  <div class="container">
    <div class="section-header">
      <span class="section-label">Our Journey</span>
      <h2 class="section-title">30 Years of <span>Trust</span></h2>
      <div class="section-divider"></div>
      <p class="section-subtitle">From a small start in Madurai to a trusted textile distributor across Tamil Nadu.</p>
    </div>

    <div class="timeline">
      <div class="timeline-line"></div>
      <div class="timeline-item" *ngFor="let m of milestones; let i = index" [class]="m.side">
        <div class="timeline-dot">
          <i [class]="m.icon"></i>
        </div>
        <div class="timeline-content">
          <span class="timeline-year">{{ m.year }}</span>
          <h3 class="timeline-title">{{ m.title }}</h3>
          <p class="timeline-desc">{{ m.desc }}</p>
        </div>
      </div>
    </div>
  </div>
</section>
